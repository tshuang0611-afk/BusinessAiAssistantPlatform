# ============================================================
# docker-compose.yml（Cloud Run / 雲端正式環境）
# 啟動方式：docker-compose up -d
# 本地開發請改用：docker-compose -f docker-compose.local.yml up -d
# ============================================================

services:
  db:
    image: postgres:15
    container_name: caxn_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: caxn_platform
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    container_name: caxn_app
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app
      - ./app/uploads:/app/uploads
      # GCS 金鑰掛載（Cloud Run 部署時改用 Secret Manager，本機測試用此）
      - ./gcp-key.json:/app/gcp-key.json:ro

  frontend:
    build: ./frontend
    container_name: caxn_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000}
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: caxn_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend