# ============================================================
# docker-compose.local.yml
# 地端本機開發環境（不需要 GCS，使用本地 Volume 儲存）
# 啟動方式：docker-compose -f docker-compose.local.yml up -d
# ============================================================

services:
  db:
    image: postgres:15
    container_name: caxn_db_local
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: caxn_platform
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    container_name: caxn_app_local
    restart: always
    environment:
      # 資料庫
      DB_HOST: db
      DB_NAME: caxn_platform
      DB_USER: admin
      DB_PASS: password123
      DB_PORT: "5432"
      # JWT
      JWT_SECRET: local_dev_secret_key_change_in_prod
      JWT_EXPIRE_HOURS: "2"
      # 儲存：本地模式（不使用 GCS）
      STORAGE_PROVIDER: local
      # Gemini（從 .env 讀取，或在此填入測試用）
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key}
      # 本地測試用 ECPay 沙盒
      ECPAY_MERCHANT_ID: "2000132"
      ECPAY_HASH_KEY: "5294y06JbISpM5x9"
      ECPAY_HASH_IV: "v77hoKGq4kWxNNIS"
      ECPAY_API_URL: "https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5"
      ECPAY_RETURN_URL: "http://localhost:8000/api/payment/ecpay/callback"
      ECPAY_CLIENT_BACK: "http://localhost:3000"
      SITE_URL: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./app:/app
      - ./app/uploads:/app/uploads
      # 本地模式不需要 gcp-key.json

  frontend:
    build: ./frontend
    container_name: caxn_frontend_local
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: caxn_nginx_local
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
