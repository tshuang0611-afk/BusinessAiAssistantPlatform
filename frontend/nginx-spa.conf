server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 支援 React SPA (History Mode) — 所有路由都回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源長期快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止存取隱藏檔
    location ~ /\. {
        deny all;
    }

    # 健康檢查端點（Cloud Run 需要）
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
